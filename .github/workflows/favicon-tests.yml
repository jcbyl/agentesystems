name: Favicon visual tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  favicon:
    name: favicon (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser (${{ matrix.browser }}) + OS deps
        run: bunx playwright install --with-deps ${{ matrix.browser }}

      - name: Run favicon/touch-icon tests
        run: bunx playwright test --project=${{ matrix.browser }}-favicon
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report
          retention-days: 14

      - name: Upload snapshot diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.browser }}
          path: test-results
          retention-days: 14