name: SEO + Lighthouse

# Critical-path SEO gating:
#   1. Static SEO check (scripts/check-seo.mjs) — titles, descriptions,
#      og/canonical, robots.txt, llms.txt, sitemap. Zero-network, fast.
#   2. Lighthouse CI — production build served by `serve`, then audited
#      with thresholds in lighthouserc.json. Fails the build if
#      SEO < 0.95 or accessibility < 0.90 on any public route.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-seo:
    name: Static SEO check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check:seo

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static-seo
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: bun install --frozen-lockfile

      - name: Build production output
        run: bun run build

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
